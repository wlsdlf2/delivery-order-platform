name: Docker CI/CD to ECR

on:
  push:
    branches: [ "master" ] # master 브랜치 push할 때

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. AWS 자격 증명 설정 (ECR 접근 권한)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      # 2. ECR 로그인
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 3. JAR 빌드
      - name: Build with Gradle
        run: ./gradlew clean build -x test

      # 4. Docker 이미지 빌드 및 ECR 푸시
      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: delivery-app-repo
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      # 5. EC2에 docker-compose.yml 파일을 먼저 전송
      - name: Copy docker-compose.yml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.APP_HOST }}
          username: ubuntu # ec2-user에서 ubuntu로 수정
          key: ${{ secrets.SSH_KEY }}
          source: "docker-compose.yml, nginx/"
          target: "/home/ubuntu/app"

      # 6. EC2에 접속하여 Docker Compose 실행 
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.APP_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          envs: ENV_FILE, ECR_REPOSITORY
          script: |
            # ECR 로그인 (EC2 내부에서 수행)
            aws ecr get-login-password --region ap-northeast-2 | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}
            
            cd /home/ubuntu/app
            
            # .env 파일 생성
            echo "$ENV_FILE" > .env
            
            # 최신 이미지 풀 및 재시작
            docker compose pull
            docker compose up -d
            
            # 사용하지 않는 오래된 이미지 삭제
            docker image prune -f
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
          ECR_REPOSITORY: ${{ steps.login-ecr.outputs.registry }}
